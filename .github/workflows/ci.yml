name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.service }} (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, account]
        python: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=85

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}-py${{ matrix.python }}
          path: services/${{ matrix.service }}/coverage.xml
          if-no-files-found: ignore

  e2e-compose:
    name: End-to-end (docker compose + smoke)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Bring up the full stack
        # Mirrors what a reviewer would actually run (`docker compose up --build`).
        # Includes otel-collector, jaeger, and prometheus so we also catch any
        # boot-time misconfiguration of the observability sidecars.
        run: docker compose up -d --build

      - name: Wait for both services to be healthy
        run: |
          set -e
          for url in "http://localhost:8000/health" "http://localhost:8001/health"; do
            echo "Waiting for $url ..."
            for i in $(seq 1 60); do
              if curl -fsS "$url" >/dev/null 2>&1; then
                echo "  ✓ $url is up"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "  ✗ $url did not become healthy in 60s"
                docker compose logs
                exit 1
              fi
              sleep 1
            done
          done

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run end-to-end smoke test
        run: ./scripts/smoke.sh

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
